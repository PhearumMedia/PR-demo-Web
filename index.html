<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home - PHEARUM</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- 🌟 Header -->
  <header>
    <div class="logo">PHEARUM</div>
    <nav id="navbar">
      <a href="index.html" class="active">Home</a>
      <a href="blog.html">Blog</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
    <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </header>

  <!-- 🧭 Main Content -->
  <main>
    <!-- 🖼️ Hero Section -->
    <section id="home" class="hero">
      <div class="hero-content">
        <h1>Welcome to PHEARUM 🌍</h1>
        <p>Learning web development step by step.</p>
        <a href="about.html" class="btn">Learn More</a>
      </div>
    </section>

    <!-- 🙋‍♂️ About Section -->
    <section id="about" class="content">
      <h2>About This Project</h2>
      <p>
        This is my first responsive website.
        It adapts beautifully to all screen sizes.
      </p>
    </section>
  </main>

  <!-- ⚓ Footer -->
  <footer>
    <p>© 2025 PHEARUM. All rights reserved.</p>
  </footer>

  <!-- 📜 Script -->
  <script>
    const menuToggle = document.getElementById('menu-toggle');
    const navbar = document.getElementById('navbar');

    menuToggle.addEventListener('click', () => {
      navbar.classList.toggle('active');
      menuToggle.classList.toggle('open');
    });
  </script>
</body>
  <a href="contact.html" class="floating-contact-btn">Contact Me</a>
</html>

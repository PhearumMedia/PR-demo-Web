  </head>
  <body>
    <a class="skip-link" href="#main">Skip to main content</a>
    <!-- Header -->
    <header>
      <a class="logo" href="index.html" aria-label="Go to Home">PHEARUM</a>
      <nav id="navbar">
        <a href="index.html">Home</a>
        <a href="blog.html" class="active">Blog</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
      <button
        class="menu-toggle"
        id="menu-toggle"
        aria-label="Toggle menu"
        aria-controls="navbar"
        aria-expanded="false"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
      <button
        id="theme-toggle"
        class="theme-toggle"
        aria-label="Toggle dark mode"
        aria-pressed="false"
      >
        🌙
      </button>
    </header>

    <!-- Hero Section -->
    <section class="hero">
      <div class="hero-content">
        <h1 id="post-title">Loading...</h1>
        <p id="post-subtitle"></p>
      </div>
    </section>

    <!-- Blog Post Content -->
    <main id="main">
      <section class="blog-post-single">
        <div class="blog-single-container">
          <span class="blog-date" id="post-date"></span>
          <img src="" alt="Blog Image" id="post-image" />
          <div class="blog-single-content" id="post-content">
            <p>Loading post content...</p>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer>&copy; 2026 PHEARUM. All Rights Reserved.</footer>

    <!-- Script for dynamic post -->
    <script>
      // Define all blog posts
      const blogPosts = {
        1: {
          title: "Feeling!",
          subtitle: "A mountain valley with green hills",
          date: "Oct 25, 2025",
          image: "images/blog1.jpg",
          content: `
          <p>🌄 Discover the Beauty of Nature: A Serene Mountain Landscape:</p>
          <p>Nature has a unique way of calming the mind and refreshing the soul, and this stunning mountain landscape is a perfect example of that peaceful connection. Surrounded by rolling green hills and majestic peaks, this breathtaking view captures the essence of untouched natural beauty.</p>
          <p>🌿 A Perfect Harmony of Land and Sky:</p>
          <p>The vibrant green fields stretch gracefully across the foreground, creating a soft and inviting texture that draws the eye into the scene. These lush hills are a symbol of life and growth, contrasting beautifully with the rugged mountain ranges in the distance.</p>
          <p>Above, the sky tells its own story. Sunlight breaks through scattered clouds, sending radiant beams across the valley. This natural lighting effect not only enhances the depth of the image but also creates a magical and almost dreamlike atmosphere.</p>
          <p>⛰️ Majestic Mountains and Misty Valleys:</p>
          <p>In the background, towering mountains rise layer by layer, each fading slightly into the mist. This natural gradient adds depth and perspective, making the landscape feel vast and endless. The mist drifting through the valleys brings a sense of mystery and tranquility, inviting viewers to imagine exploring these peaceful surroundings.</p>
          <p>🌳 The Beauty of Untouched Nature:</p>
          <p>To the side, clusters of trees stand quietly along the hillside, adding balance and richness to the scenery. There are no signs of urban life—just pure, untouched nature. This makes the landscape an ideal representation of escape, relaxation, and natural harmony.</p>
          <p>🌍 Why Natural Landscapes Matter:</p>
          <p>Spending time in nature—or even viewing scenes like this—has been proven to reduce stress and improve mental well-being. Landscapes like this remind us of the importance of preserving our environment and staying connected to the natural world.</p>
          <p>📸 Perfect Inspiration for Travel and Photography:</p>
          <p>This kind of scenery is a dream for photographers, travelers, and nature lovers alike. Whether you're planning your next adventure or simply looking for inspiration, landscapes like this offer endless opportunities for exploration and creativity.</p>
        `,
        },
        2: {
          title: "Mind!",
          subtitle: "Exploring the majestic fjords",
          date: "Oct 20, 2025",
          image: "images/blog2.jpg",
          content: `
          <p>🚢 Exploring the Majestic Fjords: Nature’s Masterpiece of Water and Mountains:</p>
          <p>Few places on Earth capture the imagination quite like a fjord landscape. This breathtaking view showcases a deep blue waterway winding through towering green mountains, creating one of the most dramatic and serene natural scenes imaginable.</p>
          <p>🌊 A Stunning Blend of Water and Mountains</p>
          <p>At the heart of this landscape lies a calm, crystal-clear fjord, reflecting the sky above while guiding the eye through the valley. Large ships glide peacefully across the water, adding a sense of scale and quiet movement to the scene.</p>
          <p>Surrounding the fjord, steep mountain walls rise sharply on both sides, covered in lush greenery. Their height and ruggedness create a powerful contrast with the smooth, tranquil surface of the water below.</p>
          <p>⛰️ Towering Peaks and Scenic Valleys</p>
          <p>In the distance, layers of mountains stretch toward the horizon, each one slightly softened by atmospheric haze. Some peaks are capped with patches of snow, hinting at cooler climates and higher elevations. These natural formations create depth and a sense of vastness that feels almost endless.</p>
          <p>🛣️ A Journey Through Nature</p>
          <p>Along the edge of the fjord, a winding road hugs the mountainside, offering what must be one of the most scenic drives in the world. Small settlements are visible near the shoreline, giving a glimpse of life harmoniously integrated with nature.</p>
          <p>This balance between human presence and untouched wilderness makes the landscape even more captivating.</p>
          <p>🌍 Why Fjords Are So Special</p>
          <p>Fjords are formed by glaciers carving deep valleys over thousands of years, later filled by seawater. This geological process creates their signature steep cliffs and deep waters, making them unique and visually striking destinations.</p>
          <p>They are not only beautiful but also rich in biodiversity and cultural history.</p>
          <p>📸 A Dream Destination for Travelers</p>
          <p>Whether you're a photographer, traveler, or nature enthusiast, scenes like this offer endless inspiration. From cruising along the fjord to hiking the surrounding mountains, every angle reveals a new perspective of natural beauty.</p>

        `,
        },
        3: {
          title: "Look!",
          subtitle: "Endless green fields and peaceful countryside",
          date: "Oct 15, 2025",
          image: "images/blog3.jpg",
          content: `
        <p>🌾 Endless Green Fields: The Beauty of Peaceful Countryside Landscapes:</p>
        <p>There’s something deeply calming about wide-open fields stretching as far as the eye can see. This stunning countryside scene captures the simplicity and beauty of nature, where vibrant green crops sway gently under a bright blue sky.</p>
        <p>🌿 A Sea of Green:</p>
        <p>The foreground is filled with lush, thriving crops—likely wheat or barley—creating a rich green texture that feels alive and full of energy. The uniform rows and natural patterns guide the viewer’s eye toward the horizon, adding depth and harmony to the landscape.</p>
        <p>☁️ A Sky Full of Life:</p>
        <p>Above the fields, a vast blue sky is dotted with soft, drifting clouds. Sunlight filters through, casting gentle highlights and shadows across the land. This interplay of light enhances the vivid green tones and creates a warm, peaceful atmosphere.</p>
        <p>🌄 Rolling Hills and Natural Patterns:</p>
        <p>In the distance, smooth rolling hills rise gently, marked by subtle lines from agricultural activity. These patterns add a sense of order and rhythm, showing how human cultivation can blend beautifully with natural landscapes.</p>
        <p>🌍 The Importance of Agricultural Landscapes:</p>
        <p>Scenes like this are more than just beautiful—they represent the foundation of human life. Agricultural fields provide essential food resources and support communities around the world. Preserving and respecting these lands is vital for a sustainable future.</p>
        <p>📸 Perfect for Relaxation and Inspiration:</p>
        <p>Whether you’re a traveler, photographer, or someone seeking a moment of calm, landscapes like this offer a sense of peace and clarity. The open space, fresh air, and natural beauty create the perfect environment to relax and recharge.</p>
      `,
        },
        4: {
          title: "Sunrise Over the Mountains",
          subtitle: "A calm morning view with light, color, and fresh air",
          date: "Oct 10, 2025",
          image: "images/blog4.jpg",
          content: `
        <p>A mountain sunrise gives a quiet kind of energy. The air feels fresh, the sky changes every minute, and everything looks calm and clear.</p>
        <p>This scene shows rugged peaks, soft wildflowers, and warm light moving across the valley. It feels peaceful, but also full of possibility.</p>
        <h3>🌅 What makes this sunrise special</h3>
        <p>As the sun rises, the sky shifts through orange, pink, and blue. That soft transition gives the image depth and mood without feeling dramatic.</p>
        <p>Morning light also reveals detail in the landscape, from the texture of rocks to the gentle shape of distant hills.</p>
        <p>Mountain sunrises are often linked with:</p>
        <ul>
          <li>Fresh, crisp air</li>
          <li>A quiet and focused mind</li>
          <li>A strong sense of renewal</li>
        </ul>
        <h3>🌼 Foreground and depth</h3>
        <p>White wildflowers in the foreground add life and contrast against stone and earth. They make the frame feel balanced and natural.</p>
        <p>Behind them, the mountains appear in layers. Each layer fades a little more into the distance, creating a strong sense of scale.</p>
        <h3>🌍 Why images like this matter</h3>
        <p>Nature photography is not only visual. It can help people slow down, reset, and reconnect with simple things.</p>
        <p>Scenes like this can inspire people to:</p>
        <ul>
          <li>Explore the outdoors</li>
          <li>Appreciate natural landscapes</li>
          <li>Practice calm attention and mindfulness</li>
        </ul>
        <p>It also helps promote environmental care and long-term conservation.</p>
        <h3>📸 Tips for capturing a similar photo</h3>
        <p>If you want a result like this, keep your setup simple and focus on light first:</p>
        <ul>
          <li>Arrive early and prepare before first light</li>
          <li>Use a wide-angle lens for a full landscape view</li>
          <li>Include a foreground element like flowers or rocks</li>
          <li>Shoot during golden hour for soft color</li>
          <li>Use a tripod when light is low</li>
        </ul>
        <h3>✨ Final thought</h3>
        <p>This sunrise is a reminder that simple moments in nature can feel powerful. For travelers, photographers, and nature lovers, mornings like this are always worth it.</p>
      `,
        },
        // Add more posts here as needed
      };

      // Get post ID from URL
      const params = new URLSearchParams(window.location.search);
      const postId = params.get("id") || "1";

      // Get elements
      const titleEl = document.getElementById("post-title");
      const subtitleEl = document.getElementById("post-subtitle");
      const dateEl = document.getElementById("post-date");
      const imageEl = document.getElementById("post-image");
      const contentEl = document.getElementById("post-content");

      if (blogPosts[postId]) {
        const post = blogPosts[postId];
        titleEl.textContent = post.title;
        subtitleEl.textContent = post.subtitle;
        dateEl.textContent = post.date;
        imageEl.src = post.image;
        imageEl.alt = post.title;
        contentEl.innerHTML = post.content;
      } else {
        titleEl.textContent = "Post Not Found";
        subtitleEl.textContent = "";
        dateEl.textContent = "";
        imageEl.style.display = "none";
        contentEl.innerHTML =
          "<p>Sorry, the post you are looking for does not exist.</p>";
      }

      // Mobile menu + theme toggle
      const menuToggle = document.getElementById("menu-toggle");
      const navbarEl = document.getElementById("navbar");
      const themeToggle = document.getElementById("theme-toggle");
      if (menuToggle && navbarEl) {
        menuToggle.addEventListener("click", () => {
          const expanded = menuToggle.getAttribute("aria-expanded") === "true";
          navbarEl.classList.toggle("active");
          menuToggle.classList.toggle("open");
          menuToggle.setAttribute("aria-expanded", String(!expanded));
        });
      }

      (function () {
        if (!themeToggle) return;
        const posKey = "theme-toggle-pos";
        const applyTheme = (isDark) => {
          document.documentElement.classList.toggle("dark", isDark);
          themeToggle.setAttribute("aria-pressed", String(!!isDark));
          themeToggle.textContent = isDark ? "☀️" : "🌙";
        };
        const stored = localStorage.getItem("site-theme");
        if (stored) applyTheme(stored === "dark");
        else if (
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches
        )
          applyTheme(true);

        const storedPos = localStorage.getItem(posKey);
        if (storedPos) {
          try {
            const p = JSON.parse(storedPos);
            themeToggle.style.left = p.left + "px";
            themeToggle.style.top = p.top + "px";
            themeToggle.style.right = "auto";
          } catch (e) {}
        }

        themeToggle.addEventListener("click", () => {
          const isDark = document.documentElement.classList.toggle("dark");
          themeToggle.setAttribute("aria-pressed", String(!!isDark));
          themeToggle.textContent = isDark ? "☀️" : "🌙";
          localStorage.setItem("site-theme", isDark ? "dark" : "light");
        });

        // draggable
        let dragging = false,
          startX = 0,
          startY = 0,
          startLeft = 0,
          startTop = 0;
        themeToggle.addEventListener("pointerdown", (e) => {
          dragging = true;
          themeToggle.setPointerCapture(e.pointerId);
          startX = e.clientX;
          startY = e.clientY;
          const r = themeToggle.getBoundingClientRect();
          startLeft = r.left;
          startTop = r.top;
          e.preventDefault();
        });
        window.addEventListener("pointermove", (e) => {
          if (!dragging) return;
          const dx = e.clientX - startX;
          const dy = e.clientY - startY;
          let left = Math.max(
            8,
            Math.min(
              window.innerWidth - themeToggle.offsetWidth - 8,
              Math.round(startLeft + dx),
            ),
          );
          let top = Math.max(
            8,
            Math.min(
              window.innerHeight - themeToggle.offsetHeight - 8,
              Math.round(startTop + dy),
            ),
          );
          themeToggle.style.left = left + "px";
          themeToggle.style.top = top + "px";
          themeToggle.style.right = "auto";
        });
        window.addEventListener("pointerup", (e) => {
          if (!dragging) return;
          dragging = false;
          try {
            themeToggle.releasePointerCapture(e.pointerId);
          } catch {}
          const r = themeToggle.getBoundingClientRect();
          localStorage.setItem(
            posKey,
            JSON.stringify({
              left: Math.round(r.left),
              top: Math.round(r.top),
            }),
          );
        });
        themeToggle.addEventListener("dblclick", () => {
          themeToggle.style.removeProperty("left");
          themeToggle.style.removeProperty("top");
          themeToggle.style.right = "16px";
          themeToggle.style.top = "16px";
          localStorage.removeItem(posKey);
        });
      })();
    </script>
    <a href="contact.html" class="floating-contact-btn">Contact Me</a>
  </body>
</html>

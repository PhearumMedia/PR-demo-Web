<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHEARUM</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header>
    <div class="logo">PHEARUM</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="blog.html" class="active">Blog</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
    <div class="menu-toggle">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h1 id="post-title">Loading...</h1>
      <p id="post-subtitle"></p>
    </div>
  </section>

  <!-- Blog Post Content -->
  <main>
    <section class="blog-post-single">
      <div class="blog-single-container">
        <span class="blog-date" id="post-date"></span>
        <img src="" alt="Blog Image" id="post-image">
        <div class="blog-single-content" id="post-content">
          <p>Loading post content...</p>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    &copy; 2025 PHEARUM. All Rights Reserved.
  </footer>

  <!-- Floating Contact Button -->
  <a href="contact.html" class="floating-contact-btn">Contact Me</a>

  <!-- Script for dynamic post -->
  <script>
    // Define all blog posts
    const blogPosts = {
      1: {
        title: "How to Build Your First Website",
        subtitle: "Step-by-step guide for beginners",
        date: "Oct 25, 2025",
        image: "images/blog1.jpg",
        content: `
          <p>Learn the step-by-step process to create your first responsive website using HTML, CSS, and JavaScript.</p>
          <p>Start by structuring your HTML, then style it with CSS and add interactivity with JavaScript.</p>
        `
      },
      2: {
        title: "Tips for Writing Clean Code",
        subtitle: "Improve readability and maintainability",
        date: "Oct 20, 2025",
        image: "images/blog2.jpg",
        content: `
          <p>Discover practical tips to keep your code organized, readable, and maintainable.</p>
          <p>Use consistent naming, modular code, and proper comments to improve your projects.</p>
        `
      }
      // Add more posts here as needed
    };

    // Get post ID from URL
    const params = new URLSearchParams(window.location.search);
    const postId = params.get('id');

    // Get elements
    const titleEl = document.getElementById('post-title');
    const subtitleEl = document.getElementById('post-subtitle');
    const dateEl = document.getElementById('post-date');
    const imageEl = document.getElementById('post-image');
    const contentEl = document.getElementById('post-content');

    if (blogPosts[postId]) {
      const post = blogPosts[postId];
      titleEl.textContent = post.title;
      subtitleEl.textContent = post.subtitle;
      dateEl.textContent = post.date;
      imageEl.src = post.image;
      imageEl.alt = post.title;
      contentEl.innerHTML = post.content;
    } else {
      titleEl.textContent = "Post Not Found";
      subtitleEl.textContent = "";
      dateEl.textContent = "";
      imageEl.style.display = "none";
      contentEl.innerHTML = "<p>Sorry, the post you are looking for does not exist.</p>";
    }
  </script>
</body>
  <a href="contact.html" class="floating-contact-btn">Contact Me</a>
</html>
